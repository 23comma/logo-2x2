<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Grandiflora+One&display=swap');

        * {
            margin: 0;
            padding: 0;


        }

        html,
        body {
            width: 100%;
            height: 100%;
            font-family: "Grandiflora One", cursive;
            font-weight: 800;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        table {
            width: 600px;
            height: 300px;
        }

        td {
            width: 150px;
            height: 150px;
            text-align: right;
            vertical-align: bottom;
            padding: 5px;
        }

        table,
        tr,
        td {
            border-collapse: collapse;

        }

        .menu.image {
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
        }



        .menu.image {
            color: white;
            text-shadow: black 1px 1px 1px;
        }

        .menu.text:hover {
            transform: scale(1.1);
        }

        #electric {
            background-image: url('images/electric.png');
        }

        #light {
            background-image: url('images/light.png');
        }

        #hardware {
            background-image: url('images/hardware.png');
        }

        #service {
            background-image: url('images/service.png');
            background-size: 100px 100px;
        }

        #logo {
            color: black;
            font-size: 50px;
            text-align: center;
            vertical-align: middle;
        }
        #time{
            font-size:medium;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <td id="logo" rowspan="2" colspan="2">
                <div id="title">TITLE</div>
                <div id="time">

                </div>
            </td>
            <td id="electric" class="menu image">전기</td>
            <td id="light" class="menu image">조명</td>
        </tr>
        <tr>
            <td id="hardware" class="menu image">철물</td>
            <td id="service" class="menu image">서비스</td>
        </tr>
    </table>
    <script>
        function getCurrentTimeShort() {
            return new Intl.DateTimeFormat('ko-KR', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            }).format(new Date());
        }
        let time = document.getElementById('time');
        setInterval(function () {   
            time.innerHTML = getCurrentTimeShort();
        },1000)
    </script>
</body>

</html>
